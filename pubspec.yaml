name: tepetl
description: "Aplicación multiplataforma para el aprendizaje de lengua Náhuatl."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  fonts:
   - family: SpaceGrotesk
     fonts:
      - asset: fonts/SpaceGrotesk-Bold.ttf
      - asset: fonts/SpaceGrotesk-Light.ttf
      - asset: fonts/SpaceGrotesk-Medium.ttf
      - asset: fonts/SpaceGrotesk-Regular.ttf
      - asset: fonts/SpaceGrotesk-SemiBold.ttf
  assets:
   - assets/logo.png
   - assets/branding.png

flutter_native_splash:
  android: true
  ios: true
  web: false

  color: "#FFFFFF"
  color_dark: "#111111"
  image: assets/logo.png
  branding: assets/branding.png

  android_12:
    color: "#FFFFFF"
    color_dark: "#111111"
    image: assets/logo.png
    branding: assets/branding.png